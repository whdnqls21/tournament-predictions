<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="round">
      <rect width="512" height="512" rx="112" ry="112" />
    </clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e2a21" />
      <stop offset="1" stop-color="#0c241d" />
    </linearGradient>
  </defs>

  <g clip-path="url(#round)">
    <rect width="512" height="512" fill="url(#bg)" />

    <!-- 잔디 줄무늬 (은은하게) -->
    <g fill="#ffffff" opacity="0.03">
      <rect x="64" y="0" width="64" height="512" />
      <rect x="192" y="0" width="64" height="512" />
      <rect x="320" y="0" width="64" height="512" />
      <rect x="448" y="0" width="64" height="512" />
    </g>

    <!-- 하프웨이 라인 -->
    <line x1="0" y1="256" x2="512" y2="256" stroke="#ffffff" stroke-opacity="0.08" stroke-width="6" />

    <!-- 센터 서클 (잔디 그린) + 골드 도트 -->
    <circle cx="256" cy="256" r="118" fill="none" stroke="#46e08a" stroke-width="26" />
    <circle cx="256" cy="256" r="30" fill="#f4c64e" />
  </g>
</svg>
